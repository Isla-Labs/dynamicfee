[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"
solc = "0.8.34"
optimizer = true
optimizer_runs = 200

[profile.ci]
fuzz.runs = 1024
fuzz.depth = 256

[fuzz]
runs = 256
depth = 100

[fmt]
bracket_spacing = true
line_length = 120
number_underscore = "thousands"
multiline_func_header = 'params_first'
quote_style = 'double'
tab_width = 4
wrap_comments = false

[invariant]
fail_on_revert = true

[etherscan]
base = { key = "${BASESCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }
etherscan = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
base = "${BASE_MAINNET_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
ethereum = "${ETHEREUM_MAINNET_RPC_URL}"
sepolia = "${ETHEREUM_SEPOLIA_RPC_URL}"
